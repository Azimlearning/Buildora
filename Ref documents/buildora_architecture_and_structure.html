<script>
function sw(id,el){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

const OL = {azim:'Chip/Azim',farah:'Farah',harry:'Harry',khair:'Khair',ali:'Aliasya',all:'All'};

function f(name, open, children){ return {type:'folder',name,open,children}; }
function file(name, owner, desc){ return {type:'file',name,owner,desc}; }

const data = f('buildora/', true, [
  file('docker-compose.yml','azim','one command starts everything'),
  file('.env.example','azim','template for all API keys'),
  file('README.md','all','setup guide + demo link for judges'),
  file('pyproject.toml','azim','Python config + pytest settings'),
  f('backend/', true, [
    file('Dockerfile','azim','builds the Python container'),
    file('main.py','azim','FastAPI app entry point'),
    f('agents/', true, [
      file('orchestrator.py','azim','LangGraph graph — wires all 4 agents'),
      f('agent_a/', false, [
        file('agent.py','azim','main Agent A logic'),
        file('parsers.py','azim','pdfplumber + PyMuPDF + Tesseract OCR'),
        file('prompts.py','azim','GLM prompts for field extraction'),
      ]),
      f('agent_b/', false, [
        file('agent.py','khair','main Agent B logic'),
        file('delay_checker.py','khair','delay >3 days + cost >8% logic'),
        file('notifier.py','harry','Telegram message sender'),
      ]),
      f('agent_c/', false, [
        file('agent.py','ali','main Agent C logic — conditional'),
        file('compliance.py','ali','CIDB scoring + gap detection'),
        f('knowledge_base/', false, [
          file('cidb_bisq.json','harry','CIDB BISQ checklist — Harry digitises manually'),
        ]),
      ]),
      f('agent_d/', false, [
        file('agent.py','farah','main Agent D logic'),
        file('pdf_generator.py','farah','ReportLab branded PDF'),
        file('excel_generator.py','farah','openpyxl XLSX cost tracker'),
      ]),
    ]),
    f('api/', false, [
      file('upload.py','azim','POST /upload — receives files from browser'),
      file('projects.py','azim','GET/POST /projects'),
      file('milestones.py','khair','POST /milestones — Agent B reads this'),
      file('reports.py','farah','GET /reports/{id} — triggers Agent D'),
    ]),
    f('core/', false, [
      file('config.py','azim','reads all .env settings'),
      file('redis_client.py','khair','Redis connection + helper functions'),
      file('glm_client.py','azim','wraps all Z.AI GLM API calls'),
      file('storage.py','azim','MinIO file upload + download'),
    ]),
    f('db/', false, [
      file('models.py','khair','SQLAlchemy table definitions'),
      file('session.py','azim','PostgreSQL connection'),
    ]),
    f('tests/', true, [
      file('conftest.py','azim','shared test fixtures'),
      file('test_glm_response_parse.py','azim','Day 1 — Chip/Azim'),
      file('test_state_handoff.py','ali','Day 2 — GATE: A writes, B reads'),
      file('test_extract_fields.py','ali','Day 3 — ≥10 fields, ≥80% accuracy'),
      file('test_extract_ocr.py','ali','Day 4 — scanned PDF fallback'),
      file('test_delay_logic.py','khair','Day 5 — delay >3 days triggers flag'),
      file('test_cost_variance.py','khair','Day 6 — cost >8% triggers queue'),
      file('test_compliance_check.py','ali','Day 8 — Agent C pass/fail scoring'),
      file('test_report_output.py','farah','Day 10 — valid PDF + correct XLSX'),
      file('test_pipeline_e2e.py','all','Day 11 — full pipeline in <15s'),
    ]),
  ]),
  f('frontend/', false, [
    file('Dockerfile','farah','builds the React container'),
    file('package.json','farah','npm dependencies'),
    file('vite.config.js','farah','build config'),
    file('tailwind.config.js','farah','Tailwind CSS config'),
    f('src/', false, [
      file('main.jsx','farah','React entry point'),
      file('App.jsx','farah','routing + layout'),
      f('components/', false, [
        file('UploadZone.jsx','farah','drag-and-drop file upload'),
        file('AgentPanel.jsx','farah','live agent trace — P0 demo hook'),
        file('ProjectDashboard.jsx','farah','project list + health score'),
        file('MilestoneForm.jsx','farah','PM submits milestone updates'),
        file('ComplianceScore.jsx','farah','Agent C result display'),
        file('ReportDownload.jsx','farah','Agent D PDF/XLSX download'),
      ]),
      f('pages/', false, [
        file('Home.jsx','farah','landing + upload page'),
        file('Project.jsx','farah','per-project detail view'),
        file('DemoMode.jsx','farah','pre-loaded demo data for judges'),
      ]),
      f('api/', false, [
        file('client.js','farah','all HTTP calls to FastAPI'),
      ]),
    ]),
  ]),
  f('data/', false, [
    f('demo/', false, [
      file('sample_project.json','all','realistic Malaysian construction demo data'),
    ]),
  ]),
]);

function renderNode(node, container){
  if(node.type==='folder'){
    const wrap = document.createElement('div');
    const row = document.createElement('div');
    row.className='ti clk';
    row.innerHTML=`<span class="icon">${node.open?'▾':'▸'}</span><span class="fn folder">${node.name}</span>`;
    wrap.appendChild(row);
    const ch = document.createElement('div');
    ch.className='children';
    if(!node.open) ch.style.display='none';
    node.children.forEach(c=>renderNode(c,ch));
    wrap.appendChild(ch);
    row.addEventListener('click',()=>{
      const vis=ch.style.display!=='none';
      ch.style.display=vis?'none':'';
      row.querySelector('.icon').textContent=vis?'▸':'▾';
    });
    container.appendChild(wrap);
  } else {
    const row = document.createElement('div');
    row.className='ti';
    const badge = node.owner ? `<span class="badge b-${node.owner}">${OL[node.owner]}</span>` : '';
    const desc = node.desc ? `<span class="desc">— ${node.desc}</span>` : '';
    row.innerHTML=`<span class="icon">·</span><span class="fn">${node.name}</span>${badge}${desc}`;
    container.appendChild(row);
  }
}

renderNode(data, document.getElementById('tr'));
</script>
